{% extends 'base.html' %}

{% block content %}

<h1>Delete Study Log</h1>

<p>Are you sure you want to delete this study log?</p>

<p><strong>Date:</strong> {{ studylog.date }}</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>

</form>

<br>

<a href="{% url 'studylog_list' %}">
    Cancel
</a>

{% endblock %}
