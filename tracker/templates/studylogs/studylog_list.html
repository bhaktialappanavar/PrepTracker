{% extends 'base.html' %}

{% block content %}

<div class="page-title">

    <h1>Study Logs</h1>

    <a href="{% url 'add_studylog' %}" class="add-btn">
        + Add Study Log
    </a>

</div>

<table>

    <thead>

        <tr>
            <th>Date</th>
            <th>Hours</th>
            <th>Notes</th>
            <th>Actions</th>
        </tr>

    </thead>

    <tbody>

        {% for studylog in studylogs %}

        <tr>
            <td>{{ studylog.date }}</td>
            <td>{{ studylog.hours }}</td>
            <td>{{ studylog.notes }}</td>
            <td>

                <a href="{% url 'edit_studylog' studylog.id %}" class="action-btn edit-btn">
                    Edit
                </a>

                <a href="{% url 'delete_studylog' studylog.id %}" class="action-btn delete-btn">
                    Delete
                </a>

            </td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="4" class="empty">
                No Study Logs Added
            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
