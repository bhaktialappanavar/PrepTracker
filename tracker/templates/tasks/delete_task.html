{% extends 'base.html' %}

{% block content %}

<h1>Delete Task</h1>

<p>
Are you sure you want to delete
<b>{{ task.title }}</b>?
</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">
        Delete
    </button>

</form>

<br>

<a href="{% url 'task_list' %}">
    Cancel
</a>

{% endblock %}
