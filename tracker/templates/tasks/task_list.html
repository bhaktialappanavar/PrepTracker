{% extends 'base.html' %}

{% block content %}

<div class="page-title">

    <h1>Daily Tasks</h1>

    <a href="{% url 'add_task' %}" class="add-btn">
        + Add Task
    </a>

</div>

<table>

    <thead>

        <tr>

            <th>Task</th>
            <th>Due Date</th>
            <th>Status</th>
            <th>Actions</th>

        </tr>

    </thead>

    <tbody>

        {% for task in tasks %}

        <tr>

            <td>{{ task.title }}</td>
            <td>{{ task.due_date }}</td>
            <td>

                {% if task.completed %}

                    <span class="completed">✔ Completed</span>

                {% else %}

                    <span class="pending">✖ Pending</span>

                {% endif %}

            </td>

            <td>

                <a href="{% url 'edit_task' task.id %}" class="action-btn edit-btn">
                    Edit
                </a>

                <a href="{% url 'delete_task' task.id %}" class="action-btn delete-btn">
                    Delete
                </a>

            </td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="4" class="empty">
                No Tasks Added
            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
