{% extends 'base.html' %}

{% block content %}

<h1>Delete Topic</h1>

<p>

Are you sure you want to delete

<b>{{ topic.name }}</b> ?

</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">
        Delete
    </button>

</form>

<br>

<a href="{% url 'topic_list' %}">
    Cancel
</a>

{% endblock %}
